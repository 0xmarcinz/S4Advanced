name: Theos CI

on:
  push:
    #tags:
    #  - 'v*'
    #branches: [ master ]

jobs:
  build:
    runs-on: macos-latest
    
    permissions:
      contents: write 

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Check cache
      id: verify-cache
      run: |
        HEADS="$(git ls-remote https://github.com/theos/theos | head -n 1 | cut -f 1)-$(git ls-remote https://github.com/xybp888/iOS-SDKs | head -n 1 | cut -f 1)"
        echo "heads=$HEADS" >> $GITHUB_OUTPUT

    - name: Use cache
      id: cache
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/theos
        key: ${{ runner.os }}-${{ steps.verify-cache.outputs.heads }}

    - name: Prepare Theos
      uses: Randomblock1/theos-action@v1

    - name: Build package
      run: |
        rm -f packages/*
        make package FINALPACKAGE=1

    - name: Release
      uses: softprops/action-gh-release@v2
      # if: startsWith(github.ref, 'refs/tags/')
      with:
        files: ${{ github.workspace }}/packages/*.deb
        tag_name: "latest"
        name: "Latest Build"
      # Note: softprops/action-gh-release@v2 automatically uses the standard token,
      # but leaving your env definition here is perfectly fine.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
