name: Theos CI

on:
  push:
    # Trigger on the "new" branch
    branches: [ "new" ]
    # tags:
    #   - 'v*'
  release:
    types: [published]

jobs:
  build:
    runs-on: macos-latest
    
    # Required for the Release step to function on a branch push
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Check cache
      id: verify-cache
      run: |
        # Updated from deprecated set-output to GITHUB_OUTPUT
        HEADS="$(git ls-remote https://github.com/roothide/theos | head -n 1 | cut -f 1)-$(git ls-remote https://github.com/xybp888/iOS-SDKs | head -n 1 | cut -f 1)"
        echo "heads=$HEADS" >> $GITHUB_OUTPUT

    - name: Use cache
      id: cache
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/theos
        key: ${{ runner.os }}-${{ steps.verify-cache.outputs.heads }}

    - name: Prepare Theos
      uses: Randomblock1/theos-action@v1
      with:
        theos-src: 'https://github.com/roothide/theos'

    - name: Get tag
      if: ${{ startsWith(github.ref, 'refs/tags/') }}
      id: tag
      uses: dawidd6/action-get-tag@v1

    - name: Build Release package - Rootful Substrate
      run: |
        make clean
        TAGNAME=${{ steps.tag.outputs.tag }}
        TAGNAME=${TAGNAME:-v0.0.0-debug}
        make package FINALPACKAGE=1 PACKAGE_VERSION=${TAGNAME#v}+rootful

    - name: Build Release package - Rootless Substrate
      run: |
        make clean
        TAGNAME=${{ steps.tag.outputs.tag }}
        TAGNAME=${TAGNAME:-v0.0.0-debug}
        make package ROOTLESS=1 FINALPACKAGE=1 PACKAGE_VERSION=${TAGNAME#v}+rootless

    - name: Build Release package - Rootless Roothide Substrate
      run: |
        make clean
        TAGNAME=${{ steps.tag.outputs.tag }}
        TAGNAME=${TAGNAME:-v0.0.0-debug}
        make package ROOTHIDE=1 FINALPACKAGE=1 PACKAGE_VERSION=${TAGNAME#v}+roothide
     
    - name: Upload to GitHub Actions artifact
      uses: NyaMisty/upload-artifact-as-is@master
      with:
        path: packages/*

    - name: Release
      uses: softprops/action-gh-release@v2
      # Removed the 'if' condition so this step runs on branch pushes
      with:
        files: ${{ github.workspace }}/packages/*.deb
        # Provide a static tag name so it updates the same release on every push
        tag_name: "latest-new" 
        name: "Latest Build (new branch)"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
